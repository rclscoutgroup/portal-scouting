<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RCL Scout Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 text-center border border-slate-200">
            <img src="https://santapolacf.es/images/ESCUDO3.png" alt="Escudo" class="h-28 mx-auto mb-5 drop-shadow-lg">
            <h1 class="text-2xl font-black text-slate-900 mb-6">PORTAL DE OJEADORES</h1>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="correo" placeholder="Correo asignado" required class="w-full px-4 py-3 rounded border outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition">
                <input type="password" id="contrasena" placeholder="Contraseña" required class="w-full px-4 py-3 rounded border outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition">
                <button type="submit" id="btnLogin" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded transition shadow-md">Acceder al Panel</button>
            </form>
            <p id="loginError" class="text-red-500 text-sm mt-4 font-medium hidden"></p>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden min-h-screen flex flex-col">
        <header class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <img src="https://santapolacf.es/images/ESCUDO3.png" class="h-10">
                <h1 class="text-lg font-bold tracking-wider">RCL SCOUT GROUP</h1>
            </div>
            <p id="nombreUsuario" class="font-bold hidden sm:block bg-blue-800 px-4 py-1 rounded-full text-sm"></p>
        </header>
        
        <main class="p-4 md:p-6 max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-6 h-[calc(100vh-80px)]">
            
            <div class="flex flex-col gap-6 overflow-y-auto pr-2 pb-6">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-blue-600"></div>
                    <span class="bg-blue-50 text-blue-700 border border-blue-200 px-3 py-1 rounded-full text-xs font-bold uppercase">Tarea Activa</span>
                    <h3 id="txtPartido" class="text-lg font-bold mt-4 text-slate-800 leading-tight"></h3>
                    <p class="text-slate-600 text-sm mt-2 mb-5 bg-slate-50 p-2 rounded border border-slate-100">Objetivo: <span id="txtEquipo" class="font-bold text-slate-800"></span></p>
                    <a id="btnVerPartido" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 rounded transition shadow-sm">
                        <span>▶️</span> Ver Partido
                    </a>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                    <h4 class="font-bold mb-4 text-slate-800 flex items-center gap-2">
                        <span>📁</span> Entregar Archivos
                    </h4>
                    <div class="space-y-4 mb-5">
                        <div class="border border-dashed border-slate-300 p-3 rounded-lg bg-slate-50 hover:bg-white transition">
                            <label class="block text-sm font-bold text-slate-700 mb-2">📄 Informe (PDF)</label>
                            <input type="file" id="filePdf" accept=".pdf" class="w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-blue-100 file:text-blue-700 file:font-semibold cursor-pointer">
                        </div>
                        <div class="border border-dashed border-slate-300 p-3 rounded-lg bg-slate-50 hover:bg-white transition">
                            <label class="block text-sm font-bold text-slate-700 mb-2">🎞️ Cortes (Vídeo)</label>
                            <input type="file" id="fileVideo" accept="video/mp4,video/*" class="w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-blue-100 file:text-blue-700 file:font-semibold cursor-pointer">
                        </div>
                    </div>
                    <button id="btnCompletar" onclick="subirArchivos()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded transition shadow-sm">
                        Subir a Drive y Completar
                    </button>
                    <p id="mensajeExito" class="text-emerald-600 text-sm font-bold text-center mt-3 bg-emerald-50 p-2 rounded hidden">¡Archivos subidos y Tarea Completada!</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col justify-center items-center p-8 h-full min-h-[400px] text-center">
                <div class="max-w-sm">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4 shadow-sm">
                        📊
                    </div>
                    <h2 class="text-xl font-black text-slate-900 mb-2">Tu Base de Datos de Jugadores</h2>
                    <p class="text-slate-500 text-sm mb-6">Accede a tu formato oficial para registrar posiciones, atributos y descripciones técnicas de forma segura y sin bloqueos.</p>
                    
                    <button onclick="abrirExcelSeguro()" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition transform hover:-translate-y-0.5 w-full justify-center">
                        <span>🔓</span> Abrir Excel en Pestaña Segura
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // PEGA AQUÍ LA NUEVA URL DE APPS SCRIPT
        const SCRIPT_URL = "TU_URL_AQUI"; 
        let datosUsuario = {};

        async function enviarA_Google(datos) {
            const respuesta = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(datos),
                headers: { "Content-Type": "text/plain;charset=utf-8" }
            });
            return await respuesta.json();
        }

        // --- LOGIN ---
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            document.getElementById("btnLogin").innerText = "Verificando Credenciales...";
            
            const correo = document.getElementById("correo").value;
            const contrasena = document.getElementById("contrasena").value;
            
            try {
                const res = await enviarA_Google({ accion: "login", correo: correo, contrasena: contrasena });
                if(res.exito) {
                    datosUsuario = res;
                    
                    document.getElementById("nombreUsuario").innerText = `Analista: ${res.nombre}`;
                    document.getElementById("txtPartido").innerText = res.partido || "Sin partido asignado";
                    document.getElementById("txtEquipo").innerText = res.equipo || "-";
                    document.getElementById("btnVerPartido").href = res.link || "#";

                    document.getElementById("login-screen").classList.add("hidden");
                    document.getElementById("dashboard-screen").classList.remove("hidden");
                } else {
                    mostrarError("Credenciales incorrectas o usuario no encontrado.");
                }
            } catch (error) {
                mostrarError("Error de conexión. Revisa que la URL SCRIPT_URL sea correcta.");
            }
        });

        function mostrarError(msg) {
            const err = document.getElementById("loginError");
            err.innerText = msg;
            err.classList.remove("hidden");
            document.getElementById("btnLogin").innerText = "Acceder al Panel";
        }

        // --- APERTURA SEGURA DEL EXCEL ---
        function abrirExcelSeguro() {
            if(datosUsuario.idExcel) {
                window.open(`https://docs.google.com/spreadsheets/d/${datosUsuario.idExcel}/edit`, '_blank');
            } else {
                alert("Error: No se ha encontrado ningún archivo Excel en tu carpeta asignada. Contacta con coordinación.");
            }
        }

        // --- SUBIDA A DRIVE ---
        function leerBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); 
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        async function subirArchivos() {
            if(!datosUsuario.idCarpeta) { 
                alert("Error: No tienes una carpeta asignada en el sistema."); 
                return; 
            }
            
            const pdfFile = document.getElementById("filePdf").files[0];
            const videoFile = document.getElementById("fileVideo").files[0];

            if(!pdfFile && !videoFile) {
                alert("Selecciona al menos un archivo (PDF o Vídeo) para entregar.");
                return;
            }

            const btn = document.getElementById("btnCompletar");
            btn.innerText = "Subiendo archivos... Espera"; 
            btn.disabled = true;
            btn.classList.replace("bg-emerald-600", "bg-slate-500");

            let payload = { 
                accion: "subir_y_completar", 
                fila: datosUsuario.fila, 
                idCarpeta: datosUsuario.idCarpeta 
            };
            
            if(pdfFile) { 
                payload.pdfBase64 = await leerBase64(pdfFile); 
                payload.pdfNombre = pdfFile.name; 
            }
            if(videoFile) { 
                payload.videoBase64 = await leerBase64(videoFile); 
                payload.videoMime = videoFile.type; 
                payload.videoNombre = videoFile.name; 
            }

            try {
                const res = await enviarA_Google(payload);
                if(res.exito) {
                    btn.innerText = "✓ Tarea Completada";
                    btn.classList.replace("bg-slate-500", "bg-emerald-600");
                    document.getElementById("mensajeExito").classList.remove("hidden");
                } else {
                    alert("Error en el servidor al guardar.");
                    resetBoton(btn);
                }
            } catch (error) {
                alert("Falló la subida. Revisa el tamaño del vídeo.");
                resetBoton(btn);
            }
        }

        function resetBoton(btn) {
            btn.innerText = "Subir a Drive y Completar";
            btn.disabled = false;
            btn.classList.replace("bg-slate-500", "bg-emerald-600");
        }
    </script>
</body>
</html>
