<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RCL Scout Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 text-center border border-slate-200">
            <img src="https://santapolacf.es/images/ESCUDO3.png" alt="Escudo" class="h-28 mx-auto mb-5 drop-shadow-lg">
            <h1 class="text-2xl font-black text-slate-900 mb-6">PORTAL DE OJEADORES</h1>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="correo" placeholder="Correo asignado" required class="w-full px-4 py-3 rounded border outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition">
                <input type="password" id="contrasena" placeholder="Contraseña" required class="w-full px-4 py-3 rounded border outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition">
                <button type="submit" id="btnLogin" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded transition shadow-md">Acceder al Panel</button>
            </form>
            <p id="loginError" class="text-red-500 text-sm mt-4 font-medium hidden"></p>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden min-h-screen flex flex-col">
        <header class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <img src="https://santapolacf.es/images/ESCUDO3.png" class="h-10">
                <h1 class="text-lg font-bold tracking-wider">RCL SCOUT GROUP</h1>
            </div>
            <p id="nombreUsuario" class="font-bold hidden sm:block bg-blue-800 px-4 py-1 rounded-full text-sm"></p>
        </header>
        
        <main class="p-4 md:p-6 max-w-[1600px] mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-80px)]">
            
            <div class="lg:col-span-4 flex flex-col gap-6 overflow-y-auto pr-2 pb-6">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-blue-600"></div>
                    <span class="bg-blue-50 text-blue-700 border border-blue-200 px-3 py-1 rounded-full text-xs font-bold uppercase">Tarea Activa</span>
                    <h3 id="txtPartido" class="text-lg font-bold mt-4 text-slate-800 leading-tight"></h3>
                    <p class="text-slate-600 text-sm mt-2 mb-5 bg-slate-50 p-2 rounded border border-slate-100">Objetivo: <span id="txtEquipo" class="font-bold text-slate-800"></span></p>
                    <a id="btnVerPartido" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 rounded transition shadow-sm">
                        <span>▶️</span> Ver Partido
                    </a>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                    <h4 class="font-bold mb-4 text-slate-800">📁 Entregar Archivos</h4>
                    <div class="space-y-4 mb-5">
                        <div class="border border-dashed border-slate-300 p-3 rounded-lg bg-slate-50 hover:bg-white transition">
                            <label class="block text-sm font-bold text-slate-700 mb-2">📄 Informe (PDF)</label>
                            <input type="file" id="filePdf" accept=".pdf" class="w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-blue-100 file:text-blue-700 font-semibold cursor-pointer">
                        </div>
                        <div class="border border-dashed border-slate-300 p-3 rounded-lg bg-slate-50 hover:bg-white transition">
                            <label class="block text-sm font-bold text-slate-700 mb-2">🎞️ Cortes (Vídeo)</label>
                            <input type="file" id="fileVideo" accept="video/mp4,video/*" class="w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-blue-100 file:text-blue-700 font-semibold cursor-pointer">
                        </div>
                    </div>
                    <button id="btnCompletar" onclick="subirArchivos()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded transition shadow-sm">
                        Subir a Drive y Completar
                    </button>
                    <p id="mensajeExito" class="text-emerald-600 text-sm font-bold text-center mt-3 hidden">¡Archivos subidos!</p>
                </div>
            </div>

            <div class="lg:col-span-8 bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col h-full">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h2 class="text-xl font-bold">Base de Datos de Jugadores</h2>
                    <button id="btnAnadir" onclick="abrirModalBD(0)" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow transition hidden">
                        + Añadir Jugador
                    </button>
                </div>
                
                <div id="listaJugadores" class="flex-grow space-y-3 overflow-y-auto pr-2">
                    <p id="estadoBD" class="text-slate-500 text-center py-10 font-medium">Cargando tu espacio de trabajo...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="modalBD" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-2xl w-full p-6 shadow-2xl">
            <h2 id="modalTitulo" class="text-xl font-bold mb-4 border-b pb-2">Datos del Jugador</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="hidden" id="editFila">
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500">NOMBRE</label>
                    <input type="text" id="editNombre" class="w-full px-3 py-2 border border-slate-300 rounded text-sm outline-none focus:border-blue-600">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500">APELLIDO/S</label>
                    <input type="text" id="editApellidos" class="w-full px-3 py-2 border border-slate-300 rounded text-sm outline-none focus:border-blue-600">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500">POS</label>
                    <input type="text" id="editPos" class="w-full px-3 py-2 border border-slate-300 rounded text-sm outline-none focus:border-blue-600">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-500">ALTURA</label>
                    <input type="text" id="editAltura" class="w-full px-3 py-2 border border-slate-300 rounded text-sm outline-none focus:border-blue-600">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-bold mb-1 text-slate-500">ATRIBUTOS CLAVE</label>
                <input type="text" id="editAtributos" class="w-full px-3 py-2 border border-slate-300 rounded text-sm outline-none focus:border-blue-600">
            </div>
            <div class="mb-5">
                <label class="block text-xs font-bold mb-1 text-slate-500">DESCRIPCIÓN TÉCNICA / TÁCTICA</label>
                <textarea id="editDescripcion" rows="4" class="w-full px-3 py-2 border border-slate-300 rounded text-sm outline-none focus:border-blue-600"></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                <button onclick="cerrarModalBD()" class="bg-slate-200 hover:bg-slate-300 px-5 py-2 rounded text-slate-800 font-bold text-sm transition">Cancelar</button>
                <button id="btnGuardarJugador" onclick="guardarJugador()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold text-sm shadow transition">Guardar Informe</button>
            </div>
        </div>
    </div>

    <script>
        // PEGA AQUÍ LA NUEVA URL DE APPS SCRIPT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNQAdOPguxiqPQWSPuNHAUm3WO1_e5RnYO_PwtsZW03FycnfFbb389TOXzO0JV-7BN/exec"; 
        let datosUsuario = {};

        async function enviarA_Google(datos) {
            const respuesta = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(datos),
                headers: { "Content-Type": "text/plain;charset=utf-8" }
            });
            return await respuesta.json();
        }

        // --- 1. LOGIN ---
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            document.getElementById("btnLogin").innerText = "Conectando...";
            const correo = document.getElementById("correo").value;
            const contrasena = document.getElementById("contrasena").value;
            
            try {
                const res = await enviarA_Google({ accion: "login", correo: correo, contrasena: contrasena });
                if(res.exito) {
                    datosUsuario = res;
                    
                    document.getElementById("nombreUsuario").innerText = `Analista: ${res.nombre}`;
                    document.getElementById("txtPartido").innerText = res.partido || "Sin partido asignado";
                    document.getElementById("txtEquipo").innerText = res.equipo || "-";
                    document.getElementById("btnVerPartido").href = res.link || "#";

                    document.getElementById("login-screen").classList.add("hidden");
                    document.getElementById("dashboard-screen").classList.remove("hidden");

                    if(datosUsuario.idExcel) {
                        document.getElementById("btnAnadir").classList.remove("hidden");
                        cargarJugadores();
                    } else {
                        document.getElementById("estadoBD").innerHTML = "<span class='text-red-500'>⚠️ No se ha encontrado tu archivo 'Google Sheets' en la carpeta.</span>";
                    }
                } else {
                    mostrarError("Credenciales incorrectas.");
                }
            } catch (error) { mostrarError("Error de conexión."); }
        });

        function mostrarError(msg) {
            document.getElementById("loginError").innerText = msg;
            document.getElementById("loginError").classList.remove("hidden");
            document.getElementById("btnLogin").innerText = "Acceder al Panel";
        }

        // --- 2. GESTIÓN NATIVA DE JUGADORES ---
        async function cargarJugadores() {
            document.getElementById("estadoBD").innerText = "Sincronizando jugadores...";
            const res = await enviarA_Google({ accion: "cargar_jugadores", idExcel: datosUsuario.idExcel });
            const contenedor = document.getElementById("listaJugadores");
            contenedor.innerHTML = "";
            
            if(res.exito && res.datos.length > 0) {
                res.datos.reverse().forEach(j => {
                    const jStr = JSON.stringify(j).replace(/'/g, "\\'");
                    contenedor.innerHTML += `
                        <div class="p-4 border border-slate-200 rounded-lg bg-slate-50 hover:bg-white hover:shadow-md transition">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h5 class="font-black text-slate-800 text-lg">${j.nombre} ${j.apellidos}</h5>
                                    <p class="text-xs text-slate-500 font-bold tracking-wide">POS: ${j.posicion} | ALT: ${j.altura}</p>
                                </div>
                                <button onclick='abrirModalBD(${j.fila}, ${jStr})' class="text-xs bg-slate-200 hover:bg-blue-600 hover:text-white text-slate-700 px-4 py-2 rounded font-bold transition">Editar</button>
                            </div>
                            <p class="text-sm font-semibold text-slate-700 mt-2">Atributos: <span class="font-normal text-slate-600">${j.atributos}</span></p>
                            <p class="text-sm text-slate-600 mt-1">${j.descripcion}</p>
                        </div>
                    `;
                });
            } else {
                contenedor.innerHTML = "<p class='text-center py-10 text-slate-500'>Aún no hay jugadores registrados.</p>";
            }
        }

        function abrirModalBD(fila, datos = null) {
            document.getElementById("editFila").value = fila;
            document.getElementById("modalTitulo").innerText = fila === 0 ? "Registrar Nuevo Jugador" : "Editar Informe";
            
            document.getElementById("editNombre").value = datos ? datos.nombre : "";
            document.getElementById("editApellidos").value = datos ? datos.apellidos : "";
            document.getElementById("editPos").value = datos ? datos.posicion : "";
            document.getElementById("editAltura").value = datos ? datos.altura : "";
            document.getElementById("editAtributos").value = datos ? datos.atributos : "";
            document.getElementById("editDescripcion").value = datos ? datos.descripcion : "";
            
            document.getElementById("modalBD").classList.remove("hidden");
        }

        function cerrarModalBD() { document.getElementById("modalBD").classList.add("hidden"); }

        async function guardarJugador() {
            const btn = document.getElementById("btnGuardarJugador");
            btn.innerText = "Sincronizando..."; btn.disabled = true;

            const datosJugador = {
                fila: document.getElementById("editFila").value,
                nombre: document.getElementById("editNombre").value,
                apellidos: document.getElementById("editApellidos").value,
                posicion: document.getElementById("editPos").value,
                altura: document.getElementById("editAltura").value,
                atributos: document.getElementById("editAtributos").value,
                descripcion: document.getElementById("editDescripcion").value
            };

            await enviarA_Google({ accion: "guardar_jugador", idExcel: datosUsuario.idExcel, datosJugador: datosJugador });
            
            cerrarModalBD();
            btn.innerText = "Guardar Informe"; btn.disabled = false;
            cargarJugadores();
        }

        // --- 3. SUBIDA A DRIVE ---
        function leerBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        async function subirArchivos() {
            if(!datosUsuario.idCarpeta) return;
            const btn = document.getElementById("btnCompletar");
            btn.innerText = "Subiendo..."; btn.disabled = true;

            const pdfFile = document.getElementById("filePdf").files[0];
            const videoFile = document.getElementById("fileVideo").files[0];

            let payload = { accion: "subir_y_completar", fila: datosUsuario.fila, idCarpeta: datosUsuario.idCarpeta };
            if(pdfFile) { payload.pdfBase64 = await leerBase64(pdfFile); payload.pdfNombre = pdfFile.name; }
            if(videoFile) { payload.videoBase64 = await leerBase64(videoFile); payload.videoMime = videoFile.type; payload.videoNombre = videoFile.name; }

            const res = await enviarA_Google(payload);
            if(res.exito) {
                btn.innerText = "Completado";
                btn.classList.replace("bg-emerald-600", "bg-slate-400");
                document.getElementById("mensajeExito").classList.remove("hidden");
            }
        }
    </script>
</body>
</html>
